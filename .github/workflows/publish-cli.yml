name: Publish Build Chain CLI

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
  workflow_dispatch:


permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      
      - name: check for version change
        id: version-check
        uses: EndBug/version-check@v3
        with:
          file-url: https://unpkg.com/@kie/build-chain-action@latest/package.json
          static-checking: localIsNew    
      
      - run: npm install
        if: steps.version-check.outputs.changed == 'true'
        
      - run: npm run build:cli
        if: steps.version-check.outputs.changed == 'true'
      
      - run: npm publish --access public
        if: steps.version-check.outputs.changed == 'true'

      - run: echo "No change detected in package.json. Won't publish"
        if: steps.version-check.outputs.changed == 'false'

